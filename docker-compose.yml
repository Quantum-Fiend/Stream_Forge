version: '3.8'

services:
  # Backend API (Kotlin)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - DATA_DIR=/data
      - ZOOKEEPER_HOSTS=zookeeper:2181
    volumes:
      - ./data:/data
    depends_on:
      - zookeeper
    networks:
      - streamforge

  # Processing Engine (Scala)
  engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    environment:
      - DATA_DIR=/data
      - API_URL=http://api:8080
    volumes:
      - ./data:/data
    depends_on:
      - api
    networks:
      - streamforge

  # ZooKeeper for coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-logs:/var/lib/zookeeper/log
    networks:
      - streamforge

  # Dashboard (Flutter - web build)
  dashboard:
    build:
      context: ./dashboard-flutter
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - streamforge

networks:
  streamforge:
    driver: bridge

volumes:
  zk-data:
  zk-logs:
