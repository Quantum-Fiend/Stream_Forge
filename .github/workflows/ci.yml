name: StreamForge CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
      
      - name: Build with Gradle
        run: ./gradlew build -x test
      
      - name: Run tests
        run: ./gradlew test

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      
      - name: Get dependencies
        working-directory: dashboard-flutter
        run: flutter pub get
      
      - name: Analyze
        working-directory: dashboard-flutter
        run: flutter analyze --no-fatal-infos
      
      - name: Run tests
        working-directory: dashboard-flutter
        run: flutter test

  docker:
    runs-on: ubuntu-latest
    needs: [backend, dashboard]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker images
        run: |
          docker build -f Dockerfile.api -t streamforge-api .
          docker build -f Dockerfile.engine -t streamforge-engine .
          docker build -f dashboard-flutter/Dockerfile -t streamforge-dashboard ./dashboard-flutter
